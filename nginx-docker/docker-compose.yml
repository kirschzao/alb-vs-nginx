name: nginx-lb-demo

services:
  app1:
    build: ../app
    restart: unless-stopped
    networks: [lbnet]

  app2:
    build: ../app
    restart: unless-stopped
    networks: [lbnet]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app1, app2]
    networks: [lbnet]

networks:
  lbnet:
    name: lbnet
