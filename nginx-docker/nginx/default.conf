# Oryza Labs production template — adapted for the ALB vs Nginx demo.
#
# What was removed for the local demo:
#   - HTTP → HTTPS redirect block (would be the first server{} in production)
#   - listen 443 ssl; ssl_protocols; ssl_ciphers; ssl_certificate directives
#   - Certbot /.well-known/acme-challenge location
#   - server_name (no public domain in local dev)
#
# Improvement over the raw production template:
#   - Connection header now uses a map so plain HTTP requests send Connection ""
#     (preserving upstream keepalive) and only real WebSocket upgrades send
#     Connection "upgrade". The original template hardcoded 'upgrade' on every
#     request, which defeats the keepalive 32 pool for ordinary HTTP traffic.

# WebSocket-aware Connection header: '' keeps upstream keepalive working
# for plain HTTP; 'upgrade' only when the client actually upgrades.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# ── upstream ─────────────────────────────────────────────────────────────────
# This block is what our template gains when one replica is not enough.
# Round-robin is the Nginx default; we switch to least_conn for workloads
# with uneven request durations (long-running jobs mixed with fast API calls).
upstream app_backend {
    server app1:3000 max_fails=3 fail_timeout=10s;
    server app2:3000 max_fails=3 fail_timeout=10s;

    keepalive 32; # idle upstream connections kept open per worker
}

# ── server ───────────────────────────────────────────────────────────────────
server {
    listen 80;

    # Production template uses ssl here — see notes at the top of this file.

    client_max_body_size 100M; # matches production; bump if you upload large files

    location / {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;

        # Headers mirror the production template exactly.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_cache_bypass                 $http_upgrade;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal health check — not exposed to application logic.
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
    }
}
